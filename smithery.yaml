name: maxion-mcp-gateway
version: 1.0.1
description: "The official MCP gateway for Maxion Windows Cores. Exposes system telemetry and enables secure workload migration via the Black Box Protocol."
startCommand:
  type: stdio
  config:
    command: "node"
    args: ["./mcp_wrapper.js"]
    env:
      STRIPE_SECRET_KEY:
        type: string
        description: "Your Stripe Secret Key for fiat subscription verification."
        required: true
      STRIPE_PRICE_ID:
        type: string
        description: "The Stripe Price ID for the $20/month plan."
        required: true
      SUPABASE_URL:
        type: string
        description: "Your Supabase project URL."
        required: true
      SUPABASE_KEY:
        type: string
        description: "Your Supabase service role or anon key."
        required: true
build:
  steps:
    - command: "npm install"
