<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maxion Core - Subscriber Tab</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;900&display=swap');
    body {
        margin: 0; padding: 20px; background: #060608; color: #d0d8e8;
        font-family: 'Outfit', sans-serif;
        display: flex; flex-direction: column; align-items: center;
    }
    .container {
        width: 100%; max-width: 400px;
        background: rgba(12, 14, 18, 0.8);
        border: 1px solid rgba(0, 242, 255, 0.2);
        border-radius: 12px; padding: 20px;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.05);
    }
    .header { text-align: center; margin-bottom: 20px; }
    .glow-text { color: #00f2ff; font-weight: 900; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
    .card { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .val { font-size: 1.5rem; font-weight: bold; color: #fff; margin-top: 5px; font-family: 'JetBrains Mono'; }
    .btn { 
        width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 6px;
        font-weight: 900; cursor: pointer; transition: 0.2s; font-family: 'JetBrains Mono';
    }
    .btn-refresh { background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1px solid #00f2ff; }
    .btn-refresh:hover { background: rgba(0, 242, 255, 0.2); }
    .btn-toggle { background: #00f2ff; color: #000; }
    .btn-toggle.off { background: #ff007a; color: #fff; }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 class="glow-text">🌱 MAXION CORE</h2>
            <p style="font-size:0.8rem; color:#888;">Ecological Optimization Active</p>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="card">
                <div style="font-size:0.7rem; color:#888;">CPU LOAD</div>
                <div class="val" id="cpu">--%</div>
            </div>
            <div class="card">
                <div style="font-size:0.7rem; color:#888;">MEMORY</div>
                <div class="val" id="mem">--%</div>
            </div>
            <div class="card">
                <div style="font-size:0.7rem; color:#888;">CORE TEMP</div>
                <div class="val" id="temp" style="font-size: 1.1rem;">--°C</div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px; text-align: left;">
            <div style="font-size:0.7rem; color:#888; margin-bottom: 12px; text-align: center; letter-spacing: 1px;">THERMAL REDUCTION ANALYSIS</div>
            
            <div style="position: relative; width: 100%; height: 14px; background: rgba(0,0,0,0.8); border-radius: 7px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);">
                <div id="tempBar" style="position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: linear-gradient(90deg, #00f2ff, #ff007a); transition: width 0.8s ease-in-out;"></div>
                
                <!-- Target Markers -->
                <div style="position: absolute; left: 20%; top: 0; height: 100%; width: 1px; background: rgba(255,255,255,0.3);"></div>
                <div style="position: absolute; left: 85%; top: 0; height: 100%; width: 1px; background: rgba(255,0,122,0.5);"></div>
            </div>
            
            <div style="display: flex; justify-content: space-between; font-size: 0.6rem; color: #888; margin-top: 6px; font-family: 'JetBrains Mono';">
                <span>Resting<br>(~40°C)</span>
                <span id="tempStatus" style="color:#00f2ff; text-align: center; font-weight: bold; margin-top: 4px;">CALCULATING...</span>
                <span style="text-align: right;">Thermal Wall<br>(~85°C)</span>
            </div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr; margin-top:-5px;">
            <div class="card" style="border-color: rgba(0,242,255,0.2);">
                <div style="font-size:0.7rem; color:#00f2ff; letter-spacing:1px;">HOURS GAINED</div>
                <div class="val" id="hours" style="color:#00f2ff;">--</div>
            </div>
            <div class="card" style="border-color: rgba(0,242,255,0.2);">
                <div style="font-size:0.7rem; color:#00f2ff; letter-spacing:1px;">ENERGY SAVED</div>
                <div class="val" id="energy" style="color:#00f2ff;">-- W</div>
            </div>
        </div>

        <button class="btn btn-refresh" onclick="fetchTelemetry()">REFRESH TELEMETRY</button>
        <button class="btn btn-toggle" id="toggleBtn" onclick="toggleEngine()">DISABLE OPTIMIZATION</button>
        <p style="font-size: 0.7rem; color: #556; text-align: center; margin-top: 15px;">Maxion is securely running in the background to prevent hibernation and optimize tasks.</p>
    </div>

    <script>
        let isEngineOn = true;

        async function fetchTelemetry() {
            try {
                const res = await fetch('/api/telemetry');
                const data = await res.json();
                
                const c = parseFloat(data.temperature);
                const f = (c * 9/5) + 32;
                
                document.getElementById('cpu').innerText = data.cpuLoad + '%';
                document.getElementById('mem').innerText = data.memoryUsage + '%';
                document.getElementById('temp').innerHTML = `${c.toFixed(1)}°C<br><span style="font-size:0.7rem; color:#aaa;">${f.toFixed(1)}°F</span>`;
                
                document.getElementById('hours').innerText = data.hoursGained;
                document.getElementById('energy').innerText = data.energySaved + ' W';

                // Chart Logic (Range roughly 30C to 90C)
                let tempPercent = ((c - 30) / 60) * 100;
                tempPercent = Math.max(5, Math.min(100, tempPercent)); // Clamp between 5% and 100%
                document.getElementById('tempBar').style.width = tempPercent + '%';

                const statusEl = document.getElementById('tempStatus');
                if (isEngineOn) {
                    statusEl.innerText = "MAXION ENGAGED";
                    statusEl.style.color = "#00f2ff";
                    document.getElementById('tempBar').style.background = "linear-gradient(90deg, #00f2ff, #0088ff)";
                } else {
                    statusEl.innerText = "STANDARD LOAD (UNPROTECTED)";
                    statusEl.style.color = "#ff007a";
                    document.getElementById('tempBar').style.background = "linear-gradient(90deg, #ff9a00, #ff007a)";
                    // Simulate heat rising without Maxion
                    tempPercent = Math.min(100, tempPercent + 30);
                    document.getElementById('tempBar').style.width = tempPercent + '%';
                }

            } catch(e) {
                document.getElementById('cpu').innerText = 'ERR';
                document.getElementById('mem').innerText = 'ERR';
                document.getElementById('temp').innerText = 'ERR';
            }
        }

        async function toggleEngine() {
            const btn = document.getElementById('toggleBtn');
            isEngineOn = !isEngineOn;
            
            if(isEngineOn) {
                btn.className = 'btn btn-toggle';
                btn.innerText = 'DISABLE OPTIMIZATION';
                await fetch('/api/toggle?state=on', {method: 'POST'});
            } else {
                btn.className = 'btn btn-toggle off';
                btn.innerText = 'ENABLE OPTIMIZATION';
                await fetch('/api/toggle?state=off', {method: 'POST'});
            }
        }

        // Initial fetch
        fetchTelemetry();
    </script>
</body>
</html>
